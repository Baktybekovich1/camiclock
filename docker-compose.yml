services:
  db:
    image: postgres:16-alpine
    container_name: camiclock-db
    environment:
      POSTGRES_DB: camiclock
      POSTGRES_USER: camiclock
      POSTGRES_PASSWORD: camiclock
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U camiclock -d camiclock"]
      interval: 10s
      timeout: 5s
      retries: 5

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: camiclock-php
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.29-alpine
    container_name: camiclock-nginx
    ports:
      - '8080:80'
    volumes:
      - ./backend:/var/www/backend:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  frontend:
    image: node:22-alpine
    container_name: camiclock-frontend
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
    environment:
      VITE_API_URL: http://localhost:8080
    depends_on:
      - nginx

volumes:
  db_data:
  frontend_node_modules:
